<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML and CSS Quiz</title>
<link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
<header>
<h1>HTML and CSS Web Development Quiz</h1>
</header>
<main>
<form action="#" method="post">
<div class="form-control">
<label for="q1">1. What does the acronym HTML stand for?</label>
<input type="text" id="q1" name="q1" required>
</div>
<div class="form-control">
<label for="q2">2. Briefly explain the primary difference between a block-level element and an inline element.</label>
<textarea id="q2" name="q2" rows="4" required></textarea>
</div>
<div class="form-control">
<label for="q3">3. Which CSS property is used to change the background color of an element?</label>
<select id="q3" name="q3" required>
<option value="" selected disabled>Choose One ...</option>
<option value="color">color</option>
<option value="background-color">background-color</option>
<option value="background-image">background-image</option>
</select>
</div>
<div class="form-control">
<label for="q4">4. How many heading tags are available in standard HTML (e.g., from h1 to hX)?</label>
<input type="number" id="q4" name="q4" min="1" max="10" required>
</div>
<div class="form-control">
<button type="submit">Submit Quiz</button>
</div>
</form>
</main>
</body>
</html>
