<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Get in touch with Kelechi David Rafting Co. Ask questions, make trip reservations, or find our office location in Abia State.">
    <meta name="author" content="Kelechi David Agoro">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <div class="logo-container">
            <img src="images/logo.png" alt="White Water Rafting Company Logo" class="logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-info-section">
            <h1>White Water Rafting Company</h1>
            <address class="company-address">
                Etima-Akpukpa, Uturu, Isuikwuato L.G.A, Abia State.<br>
                <a href="tel:+2348062067001">+2348062067001</a><br>
                <a href="mailto:info@whitewater.com">info@whitewater.com</a>
            </address>
        </section>

        <div class="contact-grid">
            <section class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3969.0733856230553!2d7.4093863!3d5.8453479!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNcKwNTAnNDMuMyJOIDfCsDI0JzMzLjgiRQ!5e0!3m2!1sen!2sng!4v1717516800000!5m2!1sen!2sng"
                  width="100%" height="350" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </section>

            <section class="form-container">
                <form action="#" method="post" class="contact-form">
                    <div class="form-group">
                        <label for="username">Name</label>
                        <input type="text" id="username" name="username"
                          placeholder="Your Full Name" required>
                    </div>

                    <div class="form-group">
                        <label for="useremail">Email</label>
                        <input type="email" id="useremail" name="useremail"
                          placeholder="username@example.com" required>
                    </div>

                    <fieldset class="form-fieldset">
                        <legend>Message Purpose</legend>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="general" checked> General
                            Inquiry
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="reservation"> Reservation
                            Question
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion
                        </label>
                    </fieldset>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here..."
                          required></textarea>
                    </div>

                    <div class="form-checkbox">
                        <label for="newsletter">
                            <input type="checkbox" id="newsletter" name="newsletter"
                              value="subscribe"> Please Subscribe me to the monthly newsletter
                        </label>
                    </div>

                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </section>
        </div>

        <section class="team-section">
            <h2>We Are Here to Serve You</h2>
            <div class="team-grid">
                <figure class="team-member">
                    <img src="images/employee1.jpg"
                      alt="Kelechi David Agoro, Managing Director Profile Pic">
                    <figcaption>Kelechi David Agoro <br><span>Managing Director</span></figcaption>
                </figure>
                <figure class="team-member">
                    <img src="images/employee2.jpg"
                      alt="Chinedu Alex, Head Safety Specialist Profile Pic">
                    <figcaption>Alex Chinedu <br><span>Head Safety Specialist</span></figcaption>
                </figure>
                <figure class="team-member">
                    <img src="images/employee3.jpg"
                      alt="Jane Markson, Logistics Coordinator Profile Pic">
                    <figcaption>Johnson Chukwudi Markson <br><span>Logistics Coordinator</span>
                    </figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Kelechi David Rafting Co. | Kelechi David Agoro</p>
        <nav class="socialmedia">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com" target="_blank">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com" target="_blank">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
